<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AEGISGRID // ULTRA COMMAND MASTER CORE</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { 
            --bg-tactical: #020305; --radar-green: #00ff66; --threat-amber: #ffaa00; --threat-red: #ff0000;
            --border-dim: rgba(0, 255, 102, 0.25); --text-digital: #a3b8b0; 
            --cyber-blue: #00ffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }
        body { background: var(--bg-tactical); color: #fff; display: flex; flex-direction: column; min-height: 100vh; transition: background 0.5s; }
        
        header { padding: 15px 20px; border-bottom: 2px solid var(--radar-green); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); transition: border 0.3s; }
        .brand h1 { color: var(--radar-green); font-size: 1.1rem; letter-spacing: 2px; }
        
        .nav-bar { display: flex; gap: 15px; padding: 10px 20px; background: rgba(0,255,102,0.05); border-bottom: 1px solid var(--border-dim); }
        .nav-btn { cursor: pointer; color: var(--text-digital); font-size: 0.7rem; text-transform: uppercase; border: none; background: none; }
        .nav-btn:hover { color: var(--radar-green); }

        main { flex: 1; padding: 20px; display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
        .console { border: 1px solid var(--border-dim); padding: 15px; background: rgba(7, 12, 10, 0.9); display: flex; flex-direction: column; gap: 10px; }
        #map { width: 100%; height: 500px; border: 1px solid var(--radar-green); position: relative; }
        
        .video-container { width: 100%; height: 150px; background: #000; border: 1px dashed var(--border-dim); overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; filter: sepia(1) hue-rotate(50deg) contrast(1.4) brightness(0.9); }
        .vid-overlay { position: absolute; top: 5px; left: 5px; font-size: 0.55rem; color: var(--radar-green); background: rgba(0,0,0,0.7); padding: 2px 5px; pointer-events: none; }

        .chat-container { border: 1px solid var(--border-dim); background: #040705; height: 150px; display: flex; flex-direction: column; justify-content: space-between; }
        .chat-messages { padding: 10px; overflow-y: auto; flex: 1; font-size: 0.65rem; color: var(--text-digital); display: flex; flex-direction: column; gap: 4px; padding: 8px; }
        .chat-input-area { display: flex; border-top: 1px solid var(--border-dim); }
        .chat-input { flex: 1; background: transparent; border: none; padding: 8px; color: #fff; font-size: 0.65rem; outline: none; }
        .chat-send-btn { background: rgba(0, 255, 102, 0.1); border: none; border-left: 1px solid var(--border-dim); color: var(--radar-green); font-size: 0.6rem; padding: 0 12px; cursor: pointer; }

        .pulse-ring { width: 18px; height: 18px; border-radius: 50%; background: var(--radar-green); animation: radarPulse 2s infinite; margin: 5px auto; }
        @keyframes radarPulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 102, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(0, 255, 102, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 102, 0); } }
        
        .widget { padding: 12px; border: 1px solid var(--border-dim); background: #0a0e0c; }
        .data-point { font-size: 0.7rem; margin-bottom: 6px; display: flex; justify-content: space-between; }
        .hash-display { font-size: 0.55rem; color: var(--radar-green); background: black; padding: 5px; word-break: break-all; border: 1px dashed var(--radar-green); text-align: center; }
        
        .btn-main { width: 100%; padding: 10px; margin-top: 5px; background: transparent; border: 1px solid var(--radar-green); color: var(--radar-green); cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.65rem; }
        .btn-main:hover { background: var(--radar-green); color: #000; }
        
        footer { padding: 15px; text-align: center; border-top: 1px solid var(--border-dim); font-size: 0.6rem; color: var(--text-digital); }
        @media (max-width: 768px) { main { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header id="mainHeader">
    <div class="brand"><h1>AEGISGRID // CORE MASTER OPS</h1></div>
    <div style="font-size: 0.7rem;">SYSTEM MODE: <span id="aiStatus" style="color:var(--radar-green)">CONNECTING...</span></div>
</header>

<div class="nav-bar">
    <button class="nav-btn" onclick="showSection('dashboard')">FIELD OPS</button>
    <button class="nav-btn" onclick="requestAdminAccess()">COMMAND TOWER</button>
    <button class="nav-btn" onclick="showSection('about')">ARCHITECT</button>
</div>

<main id="main-content">
    <section id="dashboard">
        <div class="console"><div id="map"></div></div>
    </section>
    
    <section id="admin" style="display:none;" class="console">
        <h2 style="color:var(--radar-green); font-size: 1rem;">ADMIN COMMAND // MASTER OVERRIDE</h2>
        <div class="widget">
            <h3 style="font-size: 0.6rem; color:var(--radar-green); margin-bottom:8px;">SYSTEM TELEMETRY DIAGNOSTICS</h3>
            <button class="btn-main" onclick="broadcastSystemStatus('GREEN')">SET GLOBAL STATUS: GREEN</button>
            <button class="btn-main" onclick="broadcastSystemStatus('RED')">SET GLOBAL STATUS: RED</button>
        </div>
    </section>

    <section id="about" style="display:none;" class="console">
        <h2 style="color:var(--radar-green); font-size: 1rem;">SYSTEM ARCHITECT: TIMMY DON</h2>
    </section>

    <aside id="sidebar">
        <div class="console">
            <h2 style="font-size: 0.8rem; color:var(--radar-green);">COGNITIVE FEED</h2>
            <div id="statusPulse" class="pulse-ring"></div>
            
            <div class="widget">
                <div class="data-point"><span>HIVE HEARTBEAT:</span><span id="hbStatus">●</span></div>
                <div class="data-point"><span>ACTIVE NODES:</span><span id="nodeCount">0</span></div>
            </div>

            <div class="widget" style="margin-top: 0;">
                <h4 style="font-size:0.55rem; color:var(--radar-green); margin-bottom:5px;">LOCAL DEVICE DIAGNOSTICS</h4>
                <div class="data-point"><span>NET CORES:</span><span id="cpuCores">--</span></div>
                <div class="data-point"><span>NET SPEED:</span><span id="netSpeed">--</span></div>
                <div class="data-point"><span>BATTERY:</span><span id="batteryDisplay">--</span></div>
            </div>

            <div class="chat-container">
                <div id="chatMessages" class="chat-messages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" class="chat-input" placeholder="SECURE RADIO TRANSMISSION...">
                    <button class="chat-send-btn" onclick="sendSecureChatMessage()">SEND</button>
                </div>
            </div>

            <button class="btn-main" onclick="transmitData()">TRANSMIT TELEMETRY</button>
        </div>
    </aside>
</main>

<footer>&copy; 2026 AEGISGRID DEFENSIVE SYSTEMS.</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // 1. Initialize Socket.io
    const socket = io();

    // 2. Radio Transmission & Socket Listeners
    function sendSecureChatMessage() {
        const input = document.getElementById('chatInput');
        if (!input.value.trim()) return;
        socket.emit('transmit-secure-packet', { message: input.value.trim() });
        input.value = '';
    }

    socket.on('broadcast-secure-packet', (data) => {
        const msgArea = document.getElementById('chatMessages');
        msgArea.innerHTML += `<div><span style="color:var(--radar-green)">[${data.sender}]:</span> ${data.message}</div>`;
        msgArea.scrollTop = msgArea.scrollHeight;
    });

    // 3. Diagnostics
    async function queryDeviceDiagnostics() {
        document.getElementById('cpuCores').innerText = `${navigator.hardwareConcurrency || 'N/A'} CORE THREADS`;
        if (navigator.connection) document.getElementById('netSpeed').innerText = `${navigator.connection.downlink || 'N/A'} MBPS`;
        
        if (navigator.getBattery) {
            try {
                const battery = await navigator.getBattery();
                const update = () => document.getElementById('batteryDisplay').innerText = `${Math.round(battery.level * 100)}%`;
                update();
                battery.onlevelchange = update;
            } catch(e) { document.getElementById('batteryDisplay').innerText = "BLOCKED"; }
        }
    }

    function transmitData() {
        socket.emit('transmit-secure-packet', { message: "SYSTEM_TELEMETRY_SYNC_INIT" });
    }

    window.onload = () => {
        queryDeviceDiagnostics();
        document.getElementById('aiStatus').innerText = "ONLINE // HARMONIZED GATEWAY";
    };

    function showSection(id) {
        document.getElementById('dashboard').style.display = (id === 'dashboard') ? 'block' : 'none';
        document.getElementById('admin').style.display = (id === 'admin') ? 'block' : 'none';
        document.getElementById('about').style.display = (id === 'about') ? 'block' : 'none';
        document.getElementById('sidebar').style.display = (id === 'admin') ? 'none' : 'block';
    }
</script>
</body>
</html>
