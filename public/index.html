<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AEGIS GRID // APEX INTEL CONSOLE</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    
    <style>
        :root { --neon-green: #00ff00; --dark-core: rgba(5, 10, 5, 0.96); --cyber-blue: #00ffff; --alert-red: #ff2222; }
        body, html { margin:0; padding:0; width:100%; height:100%; background:#000; font-family:'Courier New', monospace; overflow:hidden; color:#fff; }
        
        #mainLayout { display:flex; width:100%; height:100%; }
        #map { flex:1; height:100%; background:#020202; }
        
        #controlTowerSidebar { width:350px; height:100%; background:var(--dark-core); border-left:2px solid var(--neon-green); display:flex; flex-direction:column; box-sizing:border-box; z-index:10; box-shadow: 0 0 15px rgba(0,255,0,0.2); }
        .tower-block { border-bottom:1px solid rgba(0,255,0,0.2); padding:10px; }
        
        .btn { background:transparent; border:1px solid var(--neon-green); color:var(--neon-green); padding:6px; font-family:monospace; font-size:10px; font-weight:bold; cursor:pointer; width:100%; text-transform:uppercase; margin-bottom:4px; }
        .btn:hover { background:rgba(0,255,0,0.15); }
        .btn-blue { border-color:var(--cyber-blue); color:var(--cyber-blue); }
        
        #packetDisplayStream { height:110px; background:rgba(0,0,0,0.8); border:1px solid rgba(0,255,0,0.2); overflow-y:auto; padding:6px; font-size:10px; color:#00ffaa; }
        #stegoPreviewCanvas { width:100%; height:80px; background:#111; border:1px solid var(--cyber-blue); margin-top:4px; display:none; }
        
        .threat-alert-banner { background:rgba(255,0,0,0.2); border:1px solid var(--alert-red); color:var(--alert-red); font-size:9px; padding:4px; animation: flashDanger 1s infinite alternate; margin-top:4px; display:none; }
        @keyframes flashDanger { from { opacity:0.4; } to { opacity:1; } }
    </style>
</head>
<body>

<div id="mainLayout">
    <div id="map"></div>

    <div id="controlTowerSidebar">
        <div class="tower-block">
            <h3 style="color:var(--neon-green); margin:0 0 6px 0; font-size:12px;">TACTICAL CORE SYSTEMS</h3>
            <div style="font-size:9px; color:#aaa;">INTELLIGENCE ENGINE: <span style="color:#fff;">ACTIVE AI v9.4</span></div>
            <div id="threatBanner" class="threat-alert-banner">CRITICAL OVERLAP: TACTICAL THREAT ZONE DETECTED</div>
        </div>

        <div class="tower-block">
            <h3 style="color:var(--cyber-blue); margin:0 0 6px 0; font-size:11px;">CIPHER LAYER (STEGANOGRAPHY)</h3>
            <input type="file" id="stegoLoader" accept="image/*" style="display:none;" onchange="encodeSecretDataIntoDecoyImage()">
            <button class="btn btn-blue" onclick="document.getElementById('stegoLoader').click()">INJECT MAP LAYER</button>
            <button class="btn btn-blue" onclick="extractSecretDataFromDecoyImage()">DECRYPT IMAGE MATRIX</button>
            <canvas id="stegoPreviewCanvas"></canvas>
        </div>

        <div class="tower-block">
            <h3 style="color:var(--neon-green); margin:0 0 6px 0; font-size:11px;">SYNTHETIC HUMAN RADAR</h3>
            <button class="btn" onclick="toggleSyntheticHumanPopulator()">DEPLOY SIMULATED TARGETS</button>
        </div>

        <div class="tower-block" style="flex:1; display:flex; flex-direction:column;">
            <h3 style="color:var(--neon-green); margin:0 0 6px 0; font-size:11px;">INTERCEPTED FREQUENCY CODES</h3>
            <div id="packetDisplayStream"></div>
            <div style="display:flex; margin-top:6px;">
                <input type="text" id="commsPayloadInput" placeholder="ENTER MESSAGE TRANSMISSION..." style="flex:1; background:#000; border:1px solid var(--neon-green); color:#00ff00; font-family:monospace; padding:6px; font-size:10px;">
                <button onclick="dispatchSecurePacket()" style="background:var(--neon-green); color:#000; border:none; padding:0 10px; font-family:monospace; font-weight:bold; cursor:pointer;">TX</button>
            </div>
        </div>
    </div>
</div>

<script>
    const socket = io();
    let map;
    let mapMarkersMemory = {};
    let tacticalNodesData = {};
    let convergenceZoneCircles = [];
    let syntheticHumanLoopTimer = null;
    
    let originalLatitude = 6.5244;
    let originalLongitude = 3.3792;
    let internalCarrierStegoBytes = null;

    // --- 1. DEEFPAKE MATRIX AI VOICE SYNTHESIS INTERCEPT ---
    function triggerVoiceSynthesisIntercept(messageTextString) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel(); // Terminate preceding vocal cues
        
        // Isolate message body text if sender code wrapper is present
        let parsedSpeechString = messageTextString.includes(":") ? messageTextString.split(":")[1] : messageTextString;
        let speechVocalMatrix = new SpeechSynthesisUtterance(parsedSpeechString);
        
        let availableHardwareVoices = window.speechSynthesis.getVoices();
        // Fall back to a structural robotic layout engine if available
        let roboticVoiceSelection = availableHardwareVoices.find(v => v.name.includes("Google UK English Male") || v.lang.includes("en-GB")) || availableHardwareVoices[0];
        
        speechVocalMatrix.voice = roboticVoiceSelection;
        speechVocalMatrix.pitch = 0.5;  // Drops depth to create an intimidating, mechanical frequency tone
        speechVocalMatrix.rate = 0.95;  // Slows delivery to match a high-security tactical transmission
        window.speechSynthesis.speak(speechVocalMatrix);
    }

    // --- 3. AMBIENT LIGHT DECOUPLED DEAD MAN SYSTEM ---
    if ('AmbientLightSensor' in window) {
        try {
            const lightSensorMatrixInstance = new AmbientLightSensor({ frequency: 1 });
            lightSensorMatrixInstance.addEventListener('reading', () => {
                if (lightSensorMatrixInstance.illuminance < 1.0) { // Drastic light cutoff threshold (e.g., sliding phone into pocket)
                    executeEmergencyBlackoutProtocol();
                }
            });
            lightSensorMatrixInstance.start();
        } catch (err) {}
    }

    function executeEmergencyBlackoutProtocol() {
        document.body.innerHTML = `
            <div style="background:#000; color:#00ff00; width:100%; height:100%; padding:20px; font-family:monospace; font-size:11px; overflow:hidden;">
                <div>[SYSTEM HALT]: CRITICAL THREAT SECTOR DETECTED</div>
                <div>WIPING CACHE ALLOCATION REGISTER BLOCKS... SUCCESS.</div>
                <div>DISCONNECTING CORE GEOSPATIAL PROXIES... SUCCESS.</div>
                <div style="margin-top:20px; color:#fff;">Redirecting tracking vectors...</div>
            </div>
        `;
        setTimeout(() => { window.location.href = "https://www.google.com"; }, 1500);
    }

    // --- 4. STEGANOGRAPHY LAYER GRAPHICS INJECTION ---
    function encodeSecretDataIntoDecoyImage() {
        const fileTarget = document.getElementById('stegoLoader').files[0];
        if (!fileTarget) return;

        const imageReaderPipeline = new FileReader();
        imageReaderPipeline.onload = function(event) {
            const targetCanvas = document.createElement('canvas');
            const cCtx = targetCanvas.getContext('2d');
            const imgInstance = new Image();
            
            imgInstance.onload = function() {
                targetCanvas.width = imgInstance.width;
                targetCanvas.height = imgInstance.height;
                cCtx.drawImage(imgInstance, 0, 0);
                
                // Inject an explicit matrix signature directly into the visual pixel layout bytes
                let canvasPixelData = cCtx.getImageData(0, 0, targetCanvas.width, targetCanvas.height);
                canvasPixelData.data[0] = 42;  // Alpha channel indicator key signature
                canvasPixelData.data[1] = 137; // Verification checkpoint key byte
                cCtx.putImageData(canvasPixelData, 0, 0);
                
                internalCarrierStegoBytes = targetCanvas.toDataURL('image/png');
                const displayCanvas = document.getElementById('stegoPreviewCanvas');
                displayCanvas.style.display = "block";
                const dCtx = displayCanvas.getContext('2d');
                dCtx.drawImage(imgInstance, 0, 0, displayCanvas.width, displayCanvas.height);
                
                logTerminalEvent("Cipher Engine: Embedded encrypted telemetry grid coordinates into image pixels.");
            };
            imgInstance.src = event.target.result;
        };
        imageReaderPipeline.readAsDataURL(fileTarget);
    }

    function extractSecretDataFromDecoyImage() {
        if (!internalCarrierStegoBytes) {
            logTerminalEvent("Cipher Engine Fault: No encrypted image data located in buffers.");
            return;
        }
        logTerminalEvent("Analyzing pixel telemetry data streams...");
        setTimeout(() => {
            logTerminalEvent("DECRYPTION KEY VERIFIED: Target location vectors decoded successfully.");
            triggerVoiceSynthesisIntercept("Decryption successful. Displaying secret intelligence matrix layers.");
        }, 1200);
    }

    // --- 2. TACTICAL THREAT ZONE CONVERGENCE CONTOURS ---
    function evaluateStrategicThreatOverlaps() {
        convergenceZoneCircles.forEach(layer => map.removeLayer(layer));
        convergenceZoneCircles = [];
        let highDangerOverlapLocated = false;

        let nodeKeysList = Object.keys(tacticalNodesData);
        for (let i = 0; i < nodeKeysList.length; i++) {
            let matchedPairCount = 0;
            let originNode = tacticalNodesData[nodeKeysList[i]];
            if (!originNode.lat) continue;

            for (let j = 0; j < nodeKeysList.length; j++) {
                if (i === j) continue;
                let evaluationTargetNode = tacticalNodesData[nodeKeysList[j]];
                if (!evaluationTargetNode.lat) continue;

                let spatialDeltaDistance = map.distance([originNode.lat, originNode.lon], [evaluationTargetNode.lat, evaluationTargetNode.lon]);
                if (spatialDeltaDistance < 8000) { // Boundary threshold evaluation limit set at 8 kilometers
                    matchedPairCount++;
                }
            }

            if (matchedPairCount >= 2) { // Triggers warning perimeter if 3 or more nodes cluster
                highDangerOverlapLocated = true;
                let dangerSectorZone = L.circle([originNode.lat, originNode.lon], {
                    color: 'var(--alert-red)',
                    fillColor: 'var(--alert-red)',
                    fillOpacity: 0.15,
                    radius: 9000,
                    weight: 1,
                    dashArray: "5, 10"
                }).addTo(map);
                convergenceZoneCircles.push(dangerSectorZone);
            }
        }

        document.getElementById('threatBanner').style.display = highDangerOverlapLocated ? "block" : "none";
    }

    // --- SYNTHETIC HUMAN GHOST WALK SIMULATOR ---
    function toggleSyntheticHumanPopulator() {
        if (syntheticHumanLoopTimer) {
            clearInterval(syntheticHumanLoopTimer);
            syntheticHumanLoopTimer = null;
            logTerminalEvent("Simulated human grids returning to standby.");
            return;
        }

        logTerminalEvent("Injecting synthetic human entity clusters into current sector...");
        let localGhostRegistry = {};

        for (let i = 0; i < 8; i++) {
            let ghostUniqueId = `GHOST-${socket.id}-${i}`;
            localGhostRegistry[ghostUniqueId] = {
                id: ghostUniqueId,
                isGhost: true,
                lat: originalLatitude + ((Math.random() - 0.5) * 0.2),
                lon: originalLongitude + ((Math.random() - 0.5) * 0.2)
            };
        }

        syntheticHumanLoopTimer = setInterval(() => {
            Object.keys(localGhostRegistry).forEach(id => {
                let currentGhostEntity = localGhostRegistry[id];
                currentGhostEntity.lat += (Math.random() - 0.5) * 0.005;
                currentGhostEntity.lon += (Math.random() - 0.5) * 0.005;
            });
            socket.emit('inject-synthetic-cluster', localGhostRegistry);
        }, 1500);
    }

    function initMapWorkspace() {
        map = L.map('map', { zoomControl: false }).setView([originalLatitude, originalLongitude], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        navigator.geolocation.getCurrentPosition((position) => {
            originalLatitude = position.coords.latitude;
            originalLongitude = position.coords.longitude;
            map.setView([originalLatitude, originalLongitude], 8);
            socket.emit('telemetry-pulse', { lat: originalLatitude, lon: originalLongitude });
        });
    }
    initMapWorkspace();

    function dispatchSecurePacket() {
        const inputField = document.getElementById('commsPayloadInput');
        if (!inputField.value.trim()) return;
        socket.emit('transmit-secure-packet', { message: inputField.value, stegoData: internalCarrierStegoBytes });
        inputField.value = "";
    }

    socket.on('broadcast-secure-packet', function(data) {
        const messageContainer = document.getElementById('packetDisplayStream');
        const packetRow = document.createElement('div');
        packetRow.innerHTML = `<span style="color:var(--cyber-blue)">[SECURE_ID_${data.sender}]</span>: <span class="msg-text"></span>`;
        messageContainer.appendChild(packetRow);
        
        let targetTextPlaceholder = packetRow.querySelector('.msg-text');
        
        // Matrix text scroller print hook
        let loopStep = 0;
        let intervalTimer = setInterval(() => {
            targetTextPlaceholder.innerText = data.message.slice(0, loopStep) + (loopStep < data.message.length ? "_" : "");
            if(loopStep >= data.message.length) { clearInterval(intervalTimer); }
            loopStep++;
        }, 20);

        if (data.stegoData) {
            internalCarrierStegoBytes = data.stegoData;
            logTerminalEvent("System Notice: Incoming image payload contains an embedded data blueprint layer.");
        }

        messageContainer.scrollTop = messageContainer.scrollHeight;
        triggerVoiceSynthesisIntercept(data.message);
    });

    socket.on('global-matrix-update', function(allNodes) {
        tacticalNodesData = allNodes;
        Object.keys(allNodes).forEach(id => {
            let node = allNodes[id];
            if (!node.lat) return;

            let coreThemeColor = node.isGhost ? 'var(--cyber-blue)' : 'var(--neon-green)';
            let customMarkerIcon = L.divIcon({
                html: `<div style="background:${coreThemeColor}; width:12px; height:12px; border-radius:50%; box-shadow: 0 0 10px ${coreThemeColor}; border:1px solid #fff;"></div>`
            });

            if (mapMarkersMemory[id]) {
                mapMarkersMemory[id].setLatLng([node.lat, node.lon]);
            } else {
                mapMarkersMemory[id] = L.marker([node.lat, node.lon], { icon: customMarkerIcon }).addTo(map);
            }
        });
        evaluateStrategicThreatOverlaps();
    });

    function logTerminalEvent(logString) {
        const streamContainer = document.getElementById('packetDisplayStream');
        const outputNode = document.createElement('div');
        outputNode.style.color = "#77ff77";
        outputNode.innerText = `[LOG_${new Date().toLocaleTimeString()}]: ${logString}`;
        streamContainer.appendChild(outputNode);
        streamContainer.scrollTop = streamContainer.scrollHeight;
    }
</script>
</body>
</html>
