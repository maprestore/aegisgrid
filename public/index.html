<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AEGISGRID // GRANDMASTER MASTER CORE</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    
    <style>
        :root { --neon-green: #00ff00; --dark-core: rgba(10, 15, 10, 0.96); --alert-red: #ff3333; --cyber-blue: #00ffff; --infrared: #ff0055; }
        body, html { margin:0; padding:0; width:100%; height:100%; background:#000; font-family:'Courier New', monospace; overflow:hidden; color:#fff; transition: background 0.5s, transform 0.4s ease; }
        
        /* WebGL Visual Glitch Overlay Layout Class */
        .glitch-flash-active { animation: glitchPulseScreen 0.18s steps(2) 3; filter: hue-rotate(180deg) invert(1) !important; }
        @keyframes glitchPulseScreen { 0% { transform: translate(4px, -2px); } 50% { transform: translate(-3px, 3px); } 100% { transform: translate(0, 0); } }

        /* Multi-Node Canvas Tile Segment Transformation Classes */
        .stitch-role-left { transform: scale(2) translateX(25%); }
        .stitch-role-right { transform: scale(2) translateX(-25%); }

        #mainContainer { display:flex; width:100%; height:100%; position:relative; }
        #map { flex:1; height:100%; background:#020202; z-index:1; transition: all 0.4s; }
        #sidebarPanel { width:340px; height:100%; background:var(--dark-core); border-left:2px solid var(--neon-green); z-index:10; display:flex; flex-direction:column; box-sizing:border-box; transition: width 0.4s; }
        .panel-section { border-bottom:1px solid rgba(0,255,0,0.25); padding:8px; box-sizing:border-box; }
        h2, h3 { color:var(--neon-green); margin:0 0 4px 0; font-size:11px; letter-spacing:1px; text-transform:uppercase; }
        #terminalLogs { flex:1; background:rgba(0,4,0,0.85); overflow-y:auto; font-size:10px; padding:6px; border:1px solid rgba(0,255,0,0.15); color:#77ff77; margin-bottom:4px; }
        .btn { background:transparent; border:1px solid var(--neon-green); color:var(--neon-green); padding:5px 8px; font-family:monospace; font-size:10px; font-weight:bold; cursor:pointer; width:100%; box-sizing:border-box; margin-bottom:4px; text-transform:uppercase; }
        .btn:hover { background:rgba(0,255,0,0.15); }
        .btn-blue { border-color:var(--cyber-blue); color:var(--cyber-blue); }
        .btn-danger { border-color:var(--alert-red); color:var(--alert-red); }
        #radioChatBox, #stegoDisplayBox { height:65px; background:rgba(0,0,0,0.4); border:1px solid rgba(0,255,0,0.15); overflow-y:auto; padding:4px; font-size:10px; color:#00ffaa; margin-bottom:4px; }
        #videoContainer { width:100%; height:85px; background:#000; position:relative; border:1px solid rgba(0,255,0,0.2); overflow:hidden; }
        #webcamStream { width:100%; height:100%; object-fit:cover; filter: sepia(1) hue-rotate(90deg) saturate(2.5); }
        .hud-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px; font-size:9px; color:#999; }
        .ptt-active { background: var(--alert-red) !important; color: #000 !important; border-color: #fff !important; }
        
        #arRadarDisplay { display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:#000; z-index:5; }
        #arVideoFeed { width:100%; height:100%; object-fit:cover; position:absolute; top:0; left:0; }
        #arTargetOverlay { position:absolute; top:0; left:0; width:100%; height:100%; z-index:6; pointer-events:none; }
        .ar-node-tag { position:absolute; background:rgba(0,255,255,0.8); border:1px solid #fff; padding:4px; font-size:10px; color:#000; font-weight:bold; border-radius:3px; }
        
        @media (max-width:768px) { #mainContainer { flex-direction:column-reverse; } #sidebarPanel { width:100%; height:55%; border-left:none; border-top:2px solid var(--neon-green); } #map { height:45%; } }
    </style>
</head>
<body>

<div id="mainContainer">
    <div id="map"></div>

    <div id="arRadarDisplay">
        <video id="arVideoFeed" autoplay playsinline muted></video>
        <div id="arTargetOverlay"></div>
        <button class="btn btn-danger" onclick="closeSpatialARRadar()" style="position:absolute; bottom:20px; left:50%; transform:translateX(-50%); width:180px; z-index:7;">EXIT AR RADAR</button>
    </div>

    <div id="sidebarPanel">
        <div class="panel-section">
            <h2>AEGIS ULTIMATE COMMAND TOWER</h2>
            <div class="hud-grid">
                <div>BATTERY: <span id="valBat" style="color:#fff;">--</span></div>
                <div>LOCAL MESH: <span id="valMesh" style="color:var(--cyber-blue);">0 CACHED</span></div>
                <div>DEADMAN INTERVAL: <span id="valDeadman" style="color:var(--alert-red);">180s</span></div>
                <div>NET STATUS: <span id="valState" style="color:var(--neon-green);">CONNECTED</span></div>
            </div>
        </div>

        <div class="panel-section" style="background:rgba(0,15,0,0.2);">
            <h3>ADVANCED CORE MATRIX CONTROLS</h3>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:4px; margin-bottom:4px;">
                <button class="btn btn-blue" style="margin:0;" onclick="triggerSubliminalGlitchBroadcast()">EMIT GLITCH SIGNAL</button>
                <button class="btn btn-blue" style="margin:0;" onclick="executeAcousticRangingPing()">AUDIO PROX PING</button>
            </div>
            <label style="display:flex; align-items:center; justify-content:space-between; font-size:10px; margin-bottom:2px; cursor:pointer;">
                <span>SILENT STEALTH MODE</span>
                <input type="checkbox" id="stealthToggle" onchange="toggleStealthMode()" style="accent-color:var(--neon-green);">
            </label>
            <label style="display:flex; align-items:center; justify-content:space-between; font-size:10px; margin-bottom:4px; cursor:pointer;">
                <span>HIGH-FREQ SONAR PULSE</span>
                <input type="checkbox" id="sonarToggle" onchange="toggleSonarBeacon()" style="accent-color:var(--cyber-blue);">
            </label>
            <button id="pttButton" class="btn btn-blue" style="margin:0; font-size:9px;" onmousedown="startVoiceTransmission()" onmouseup="stopVoiceTransmission()" ontouchstart="startVoiceTransmission()" ontouchend="stopVoiceTransmission()">HOLD TO TALK [VOICE INTERCOM]</button>
            <div id="convergenceAlerts" style="font-size:9px; color:var(--alert-red); margin-top:2px; max-height:20px; overflow-y:auto;"></div>
        </div>

        <div class="panel-section">
            <h3>STEGANOGRAPHY SECRET COMPONENT</h3>
            <div id="stegoDisplayBox"></div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:4px;">
                <input type="file" id="stegoFile" accept="image/*" style="display:none;" onchange="processAndSendStegoImage()">
                <button class="btn btn-blue" onclick="document.getElementById('stegoFile').click()" style="margin:0; font-size:9px;">INJECT IMAGE</button>
                <button class="btn btn-blue" onclick="triggerStegoExtraction()" style="margin:0; font-size:9px;">DECODE TARGET</button>
            </div>
        </div>

        <div class="panel-section" style="display:flex; flex-direction:column;">
            <h3>SECURE PACKET COMMUNICATIONS</h3>
            <div id="radioChatBox"></div>
            <div style="display:flex;">
                <input type="text" id="radioInput" placeholder="TRANSMIT PACKET..." style="flex:1; background:#000; border:1px solid var(--neon-green); color:#00ff00; font-family:monospace; padding:4px; font-size:10px;">
                <button onclick="sendRadioPacket()" style="background:var(--neon-green); color:#000; border:none; padding:0 8px; font-family:monospace; font-weight:bold; cursor:pointer; font-size:11px;">TX</button>
            </div>
        </div>

        <div class="panel-section" style="padding:2px;">
            <div id="videoContainer"><video id="webcamStream" autoplay playsinline muted></video></div>
        </div>

        <div class="panel-section" style="display:flex; flex-direction:column; flex:1;">
            <h3>TERMINAL ACTIVITY RECORD MATRIX</h3>
            <div id="terminalLogs"></div>
            <button class="btn btn-blue" style="margin-bottom:2px;" onclick="launchSpatialARRadar()">LAUNCH SPATIAL AR RADAR</button>
            <button class="btn" style="margin-bottom:2px;" onclick="triggerManualTelemetry()">SYNC TELEMETRY</button>
            <button class="btn btn-danger" onclick="accessCommandTowerWithBiometrics()" style="margin:0;">BIOMETRIC OVERRIDE</button>
        </div>
    </div>
</div>

<canvas id="stegoCanvas" style="display:none;"></canvas>

<script>
    const socket = io();
    let map, userSectorCircle;
    let markers = {};
    let activeNodeMemoryObject = {};
    let isAdminAuthenticated = false;
    let isStealthActive = false;
    let audioContext, sonarOscillator;
    
    let mediaRecorder, voiceStream, audioThresholdAnalyser, audioThresholdSource;
    let currentDeviceCompassHeading = 0;

    // 1. VISUAL GLITCH SHADER SIGNAL ENGINE (Subliminal Screen Pulse Trigger Execution)
    function triggerSubliminalGlitchBroadcast() {
        socket.emit('trigger-subliminal-glitch', 'SECURE_ALERT_FLASH');
        logTerminalMessage("[GLITCH]: Subliminal screen pulse flash broadcasted out onto peer sockets.");
    }

    socket.on('incoming-glitch-signal', function(payload) {
        document.body.classList.add('glitch-flash-active');
        logTerminalMessage(`[INTERCEPT]: Visual glitch pulse received from terminal block: ${payload.origin}`);
        setTimeout(() => { document.body.classList.remove('glitch-flash-active'); }, 600);
    });

    // 2. CHRONOMETRIC INACTIVITY DEAD MAN'S SWITCH ENGINE (Automatic Interface Lockout Routing)
    let dynamicDeadmanCountdownTimer = 180;
    const deadmanDisplayField = document.getElementById('valDeadman');

    function refreshDeadmanActivitySignature() {
        dynamicDeadmanCountdownTimer = 180; // Reset timer boundary on user activity
        deadmanDisplayField.innerText = `${dynamicDeadmanCountdownTimer}s`;
    }

    // Monitor for any interaction markers across the screen layout coordinates
    window.addEventListener('touchstart', refreshDeadmanActivitySignature);
    window.addEventListener('touchmove', refreshDeadmanActivitySignature);
    window.addEventListener('click', refreshDeadmanActivitySignature);

    setInterval(() => {
        dynamicDeadmanCountdownTimer--;
        deadmanDisplayField.innerText = `${dynamicDeadmanCountdownTimer}s`;
        
        if (dynamicDeadmanCountdownTimer <= 0) {
            logTerminalMessage("[CRITICAL]: Dead man's switch zeroed. Initiating background memory lockout sequence.");
            executeEmergencyConsoleWipe();
        }
    }, 1000);

    // 3. AUDIO PROXIMITY RANGING ENGINE (Local Ultrasound Micro-Delay Phase Tracking)
    function executeAcousticRangingPing() {
        logTerminalMessage("[AUDIO_RANGE]: Dispatching ultrasound ranging query ping...");
        socket.emit('request-acoustic-ping-pulse');
    }

    socket.on('trigger-acoustic-chirp-response', function() {
        if (isStealthActive) return;
        logTerminalMessage("[AUDIO_RANGE]: Ping intercept received. Emitting diagnostic proximity acoustic chirp response...");
        
        // Pulse out localized acoustic sound signature response curves
        const pingCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = pingCtx.createOscillator();
        const gainNode = pingCtx.createGain();
        
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(17000, pingCtx.currentTime); // 17kHz Ranging Signature Frequency Curve
        osc.connect(gainNode);
        gainNode.connect(pingCtx.destination);
        
        gainNode.gain.setValueAtTime(1, pingCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, pingCtx.currentTime + 0.15); // Short 150ms Chirp
        
        osc.start();
        osc.stop(pingCtx.currentTime + 0.15);
    });

    // 4. MULTI-NODE CANVAS DISPLAY STITCH MATRIX ENGINE (Viewport Geometry Layout Allocator)
    socket.on('execute-display-stitch', function(assignedRoleProfile) {
        const structuralMapGrid = document.getElementById('map');
        const structuralSidebar = document.getElementById('sidebarPanel');
        
        if (assignedRoleProfile === "LEFT") {
            structuralMapGrid.className = ""; structuralMapGrid.classList.add('stitch-role-left');
            structuralSidebar.style.width = "0px"; structuralSidebar.style.overflow = "hidden";
            logTerminalMessage("[STITCH]: Screen locked into Matrix Tile position: LEFT SEGMENT.");
        } else if (assignedRoleProfile === "RIGHT") {
            structuralMapGrid.className = ""; structuralMapGrid.classList.add('stitch-role-right');
            structuralSidebar.style.width = "0px"; structuralSidebar.style.overflow = "hidden";
            logTerminalMessage("[STITCH]: Screen locked into Matrix Tile position: RIGHT SEGMENT.");
        } else {
            structuralMapGrid.className = "";
            structuralSidebar.style.width = "340px";
            logTerminalMessage("[STITCH]: Viewport reset to standard layout.");
        }
    });

    // --- SPATIAL AR RADAR HUB ---
    function launchSpatialARRadar() {
        document.getElementById('arRadarDisplay').style.display = 'block';
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(str => {
            document.getElementById('arVideoFeed').srcObject = str;
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientationabsolute', processCompassOrientationUpdate, true);
                window.addEventListener('deviceorientation', processCompassOrientationUpdate, true);
            }
            startSpatialARRenderLoop();
        }).catch(() => logTerminalMessage("[AR]: Rear environment camera inaccessible."));
    }

    function processCompassOrientationUpdate(e) { currentDeviceCompassHeading = e.alpha || e.webkitCompassHeading || 0; }

    function startSpatialARRenderLoop() {
        if(document.getElementById('arRadarDisplay').style.display === 'none') return;
        const targetContainer = document.getElementById('arTargetOverlay'); targetContainer.innerHTML = "";
        Object.keys(activeNodeMemoryObject).forEach(id => {
            const peer = activeNodeMemoryObject[id]; if(!peer.lat) return;
            let horizontalPositionOffset = (currentDeviceCompassHeading * 3) % window.innerWidth;
            const badgeTag = document.createElement('div');
            badgeTag.className = 'ar-node-tag'; badgeTag.style.left = `${horizontalPositionOffset}px`; badgeTag.style.top = `${window.innerHeight / 2}px`;
            badgeTag.innerHTML = `NODE: ${id.slice(0,4)}<br>RANGE: CALCULATING`;
            targetContainer.appendChild(badgeTag);
        });
        requestAnimationFrame(startSpatialARRenderLoop);
    }

    function closeSpatialARRadar() {
        document.getElementById('arRadarDisplay').style.display = 'none';
        const arVid = document.getElementById('arVideoFeed'); if(arVid.srcObject) arVid.srcObject.getTracks().forEach(track => track.stop());
        window.removeEventListener('deviceorientationabsolute', processCompassOrientationUpdate);
    }

    // --- KINETIC PANIC TRIGGER ACCELEROMETER MODULE ---
    let historicalShakeTimestamp = 0;
    let dynamicXAxisVector = 0, dynamicYAxisVector = 0, dynamicZAxisVector = 0;
    let absoluteXAxisBaseline = 0, absoluteYAxisBaseline = 0, absoluteZAxisBaseline = 0;

    if (window.DeviceMotionEvent) {
        window.addEventListener('devicemotion', (event) => {
            let movementAcceleration = event.accelerationIncludingGravity; let currentTimestamp = Date.now();
            if ((currentTimestamp - historicalShakeTimestamp) > 100) {
                let temporalIntervalDifference = currentTimestamp - historicalShakeTimestamp; historicalShakeTimestamp = currentTimestamp;
                dynamicXAxisVector = movementAcceleration.x; dynamicYAxisVector = movementAcceleration.y; dynamicZAxisVector = movementAcceleration.z;
                let calculatedMovementVelocityMetric = Math.abs(dynamicXAxisVector + dynamicYAxisVector + dynamicZAxisVector - absoluteXAxisBaseline - absoluteYAxisBaseline - absoluteZAxisBaseline) / temporalIntervalDifference * 10000;
                if (calculatedMovementVelocityMetric > 900) { executeEmergencyConsoleWipe(); }
                absoluteXAxisBaseline = dynamicXAxisVector; absoluteYAxisBaseline = dynamicYAxisVector; absoluteZAxisBaseline = dynamicZAxisVector;
            }
        });
    }

    function executeEmergencyConsoleWipe() {
        if (window.speechSynthesis) window.speechSynthesis.cancel();
        document.body.innerHTML = "<h1 style='color:#fff; font-family:sans-serif; text-align:center; margin-top:20%;'>404 Not Found</h1>";
        setTimeout(() => { window.location.href = "https://www.google.com"; }, 800);
    }

    // --- PASSIVE AUDIO ANALYSIS LAYER ---
    function attachAcousticMonitorLoop(audioStreamSource) {
        const audioMonitorContext = new (window.AudioContext || window.webkitAudioContext)();
        audioThresholdSource = audioMonitorContext.createMediaStreamSource(audioStreamSource);
        audioThresholdAnalyser = audioMonitorContext.createAnalyser(); audioThresholdAnalyser.fftSize = 256;
        audioThresholdSource.connect(audioThresholdAnalyser);
        const dataFrequencyArray = new Uint8Array(audioThresholdAnalyser.frequencyBinCount);
        setInterval(() => {
            if (isStealthActive) return;
            audioThresholdAnalyser.getByteFrequencyData(dataFrequencyArray);
            let absoluteVolumeSum = 0; for(let i=0; i < dataFrequencyArray.length; i++) { absoluteVolumeSum += dataFrequencyArray[i]; }
            let computedDecibelLevel = absoluteVolumeSum / dataFrequencyArray.length;
            if (computedDecibelLevel > 115) { socket.emit('acoustic-spike-breach', computedDecibelLevel); }
        }, 1500);
    }

    // --- BIOMETRIC ACCESS VERIFICATION ---
    async function accessCommandTowerWithBiometrics() {
        if (!window.PublicKeyCredential) { fallbackManualVerification(); return; }
        const hardwareChallenge = {
            challenge: new Uint8Array([1,2,3,4,11,12,13,14]), rp: { name: "AegisGrid Grandmaster" },
            user: { id: new Uint8Array([42]), name: "architect@aegisgrid.core", displayName: "Architect Admin" },
            pubKeyCredParams: [{type: "public-key", alg: -7}]
        };
        try {
            const biometricHandshake = await navigator.credentials.create({ publicKey: hardwareChallenge });
            if (biometricHandshake) { isAdminAuthenticated = true; logTerminalMessage("BIOMETRIC ACCESS CONFIRMED."); alert("COMMAND OVERRIDE ARMED."); }
        } catch (err) { fallbackManualVerification(); }
    }

    function fallbackManualVerification() {
        const keyAttempt = prompt("ENTER OVERRIDE AUTHORIZATION PHRASE:");
        fetch('/api/verify-tower', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ pass: keyAttempt }) })
        .then(res => res.json()).then(data => {
            if (data.success) { isAdminAuthenticated = true; logTerminalMessage("PORTAL VERIFIED: Core controls unlocked."); }
            else { alert("ACCESS FORBIDDEN"); }
        });
    }

    // --- WALKIE TALKIE AUDIO CHANNELS ENGINE ---
    function startVoiceTransmission() {
        document.getElementById('pttButton').classList.add('ptt-active');
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            voiceStream = stream; mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
            mediaRecorder.ondataavailable = event => {
                if (event.data.size > 0) {
                    const audioBufferReader = new FileReader();
                    audioBufferReader.onloadend = () => { socket.emit('voice-audio-chunk', audioBufferReader.result); };
                    audioBufferReader.readAsDataURL(event.data);
                }
            };
            mediaRecorder.start(250);
        }).catch(() => logTerminalMessage("Microphone drive interface drop error."));
    }

    function stopVoiceTransmission() {
        document.getElementById('pttButton').classList.remove('ptt-active');
        if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
        if (voiceStream) voiceStream.getTracks().forEach(track => track.stop());
    }

    socket.on('incoming-voice-audio', function(payload) { if (!isStealthActive) new Audio(payload.audio).play().catch(() => {}); });

    // --- LOCAL STORAGE DATA ENGINE ---
    let db; const dbRequest = indexedDB.open("AegisMeshCache", 1);
    dbRequest.onsuccess = e => { db = e.target.result; updateMeshDiagnosticDisplay(); };
    dbRequest.onupgradeneeded = e => { e.target.result.createObjectStore("offlineLogs", { keyPath: "id", autoIncrement: true }); };

    function cacheLogOffline(textPayload) {
        if(!db) return;
        const tx = db.transaction("offlineLogs", "readwrite"); tx.objectStore("offlineLogs").add({ text: textPayload, time: Date.now() });
        tx.oncomplete = () => { updateMeshDiagnosticDisplay(); };
    }

    function updateMeshDiagnosticDisplay() {
        if(!db) return;
        const tx = db.transaction("offlineLogs", "readonly"); const countRequest = tx.objectStore("offlineLogs").count();
        countRequest.onsuccess = () => { document.getElementById('valMesh').innerText = `${countRequest.result} CACHED`; };
    }

    window.addEventListener('online', () => {
        document.getElementById('valState').innerText = "CONNECTED";
        if(!db) return;
        const tx = db.transaction("offlineLogs", "readwrite"); const store = tx.objectStore("offlineLogs"); const getAllRequest = store.getAll();
        getAllRequest.onsuccess = () => {
            if(getAllRequest.result.length > 0) {
                socket.emit('bulk-mesh-sync', getAllRequest.result);
                const clearTx = db.transaction("offlineLogs", "readwrite"); clearTx.objectStore("offlineLogs").clear();
                clearTx.oncomplete = () => updateMeshDiagnosticDisplay();
            }
        };
    });
    window.addEventListener('offline', () => { document.getElementById('valState').innerText = "OFF-GRID"; });

    // --- STEGANOGRAPHY LOGIC CORE ---
    function processAndSendStegoImage() {
        const fileSelector = document.getElementById('stegoFile').files[0]; if(!fileSelector) return;
        const secretMsg = prompt("Enter secret text string to inject inside image pixels:"); if(!secretMsg) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.getElementById('stegoCanvas'); const ctx = canvas.getContext('2d');
                canvas.width = img.width; canvas.height = img.height; ctx.drawImage(img, 0, 0);
                let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height); let binaryMsg = "";
                for (let i = 0; i < secretMsg.length; i++) { let bin = secretMsg.charCodeAt(i).toString(2); binaryMsg += "0".repeat(8 - bin.length) + bin; }
                binaryMsg += "1111111111111110";
                for(let i = 0; i < binaryMsg.length; i++) { imgData.data[i] = (imgData.data[i] & 0xFE) | parseInt(binaryMsg[i]); }
                ctx.putImageData(imgData, 0, 0); socket.emit('transmit-stego-package', { imageData: canvas.toDataURL() });
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(fileSelector);
    }

    socket.on('receive-stego-package', function(bundle) {
        document.getElementById('stegoDisplayBox').innerHTML = `<div><b>[STEGO LINK from ${bundle.sender}]</b></div>
        <img src="${bundle.imageData}" id="targetStegoImg" style="width:65px; height:45px; object-fit:cover; border:1px solid #fff; cursor:pointer;" onclick="triggerStegoExtraction()">`;
    });

    function triggerStegoExtraction() {
        const targetImgElement = document.getElementById('targetStegoImg'); if(!targetImgElement) return;
        const canvas = document.getElementById('stegoCanvas'); const ctx = canvas.getContext('2d');
        canvas.width = targetImgElement.naturalWidth || targetImgElement.width; canvas.height = targetImgElement.naturalHeight || targetImgElement.height;
        ctx.drawImage(targetImgElement, 0, 0); const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        let binaryString = ""; for(let i = 0; i < imgData.data.length; i++) { binaryString += (imgData.data[i] & 1).toString(); }
        let extractedCharacters = "";
        for(let i = 0; i < binaryString.length; i += 8) {
            let byteStr = binaryString.slice(i, i + 8); if(byteStr === "11111111") break;
            extractedCharacters += String.fromCharCode(parseInt(byteStr, 2));
        }
        alert(`[EXTRACTED DATA PAYLOAD]:\n${extractedCharacters}`);
    }

    function toggleSonarBeacon() {
        const activeState = document.getElementById('sonarToggle').checked; if (!window.AudioContext && !window.webkitAudioContext) return;
        if(activeState) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)(); sonarOscillator = audioContext.createOscillator();
            sonarOscillator.type = 'sine'; sonarOscillator.frequency.setValueAtTime(18500, audioContext.currentTime);
            sonarOscillator.connect(audioContext.destination); sonarOscillator.start();
        } else { if(sonarOscillator) { sonarOscillator.stop(); sonarOscillator.disconnect(); } if(audioContext) audioContext.close(); }
    }

    socket.on('execute-hardware-audit', function() {
        socket.emit('submit-audit-payload', { viewport: `${window.innerWidth}x${window.innerHeight}`, platform: navigator.platform, userAgent: navigator.userAgent, timestamp: Date.now() });
    });

    function initMapCanvas() {
        map = L.map('map', { zoomControl: false }).setView([6.5244, 3.3792], 6);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        logTerminalMessage("Satellite telemetry master system initialized.");
    }
    initMapCanvas();

    function triggerManualTelemetry() {
        if (!navigator.onLine) { cacheLogOffline("Position Pulse Logged Offline"); return; }
        navigator.geolocation.getCurrentPosition((pos) => {
            const { latitude, longitude } = pos.coords; socket.emit('telemetry-pulse', { lat: latitude, lon: longitude });
            if (userSectorCircle) map.removeLayer(userSectorCircle);
            userSectorCircle = L.circle([latitude, longitude], { color: 'var(--neon-green)', fillColor: 'var(--neon-green)', fillOpacity: 0.1, radius: 3000 }).addTo(map);
            map.panTo([latitude, longitude]);
        });
    }

    socket.on('node-update', function(nodes) {
        activeNodeMemoryObject = nodes;
        Object.keys(nodes).forEach(id => {
            const node = nodes[id]; if (!node.lat || !node.lon) return;
            const iconColor = node.auditData ? 'var(--cyber-blue)' : 'var(--neon-green)';
            const nodeIcon = L.divIcon({ html: `<div style="background:${iconColor}; width:10px; height:10px; border-radius:50%; box-shadow:0 0 10px ${iconColor};"></div>` });
            
            let popupContent = `<b>NODE: ${id.slice(0,5)}</b>`;
            if (isAdminAuthenticated) {
                popupContent += `<br><button onclick="socket.emit('assign-stitch-matrix', {targetNodeId:'${id}', role:'LEFT'})" style="font-size:9px;">TILE LEFT</button>
                                 <br><button onclick="socket.emit('assign-stitch-matrix', {targetNodeId:'${id}', role:'RIGHT'})" style="font-size:9px;">TILE RIGHT</button>
                                 <br><button onclick="socket.emit('assign-stitch-matrix', {targetNodeId:'${id}', role:'STANDARD'})" style="font-size:9px;">RESET TILE</button>`;
            }
            if (markers[id]) markers[id].setLatLng([node.lat, node.lon]).setPopupContent(popupContent);
            else markers[id] = L.marker([node.lat, node.lon], { icon: nodeIcon }).addTo(map).bindPopup(popupContent);
        });
    });

    function sendRadioPacket() {
        const field = document.getElementById('radioInput'); if (!field.value.trim()) return;
        if (!navigator.onLine) { cacheLogOffline(`COMMS: ${field.value}`); field.value = ""; return; }
        socket.emit('radio-message', field.value); field.value = "";
    }
    
    socket.on('radio-broadcast', function(data) {
        const logBox = document.getElementById('radioChatBox'); logBox.innerHTML += `<div><span style="color:var(--neon-green)">[${data.sender}]</span>: ${data.text}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    });

    function toggleStealthMode() {
        isStealthActive = document.getElementById('stealthToggle').checked; const layoutBody = document.body;
        if (isStealthActive) {
            const vid = document.getElementById('webcamStream'); if (vid.srcObject) { vid.srcObject.getTracks().forEach(track => track.stop()); vid.srcObject = null; }
            layoutBody.style.filter = "contrast(1.5) brightness(0.2) grayscale(1)"; document.getElementById('sidebarPanel').style.background = "#000000";
        } else { layoutBody.style.filter = "none"; document.getElementById('sidebarPanel').style.background = "var(--dark-core)"; initHardwareMediaStream(); }
    }

    function initHardwareMediaStream() {
        if (isStealthActive) return;
        navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 85 }, audio: true }).then(str => { 
            const videoEl = document.getElementById('webcamStream'); videoEl.srcObject = str;
            attachAcousticMonitorLoop(str);
        }).catch(() => logTerminalMessage("Media bypass routing engaged."));
    }
    initHardwareMediaStream();

    function logTerminalMessage(str) {
        const logBox = document.getElementById('terminalLogs'); logBox.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${str}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }
</script>
</body>
</html>
