<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGISGRID // Live Geolocation Matrix</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-tactical: #020305;
            --bg-deck: rgba(7, 12, 10, 0.9);
            --radar-green: #00ff66;
            --threat-amber: #ffaa00;
            --threat-critical: #ff2222;
            --border-dim: rgba(0, 255, 102, 0.2);
            --text-digital: #a3b8b0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body, html {
            background-color: var(--bg-tactical);
            color: #ffffff;
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-dim);
            background: rgba(2, 3, 5, 0.95);
        }

        .matrix-title {
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: 3px;
            color: var(--radar-green);
        }

        .auth-badge {
            font-size: 0.7rem;
            color: #fff;
            border: 1px solid var(--radar-green);
            padding: 4px 12px;
            background: rgba(0, 255, 102, 0.05);
        }

        main {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            padding: 15px;
            max-width: 500px;
            margin: 0 auto;
        }

        .console-card {
            background: var(--bg-deck);
            border: 1px solid var(--border-dim);
            padding: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.7);
        }

        .card-header-tag {
            font-size: 0.7rem;
            color: var(--radar-green);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
            border-bottom: 1px dashed var(--border-dim);
            padding-bottom: 5px;
        }

        /* Live Geographic Map Frame Container */
        .map-frame {
            width: 100%;
            height: 250px;
            background: #040806;
            border: 1px solid rgba(0, 255, 102, 0.2);
        }

        /* Overriding Leaflet default colors to look like a dark tactical display */
        .leaflet-tile {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }

        .btn-gps-trigger {
            width: 100%;
            background: linear-gradient(90deg, rgba(0, 255, 102, 0.15), transparent);
            border: 1px solid var(--radar-green);
            color: #ffffff;
            padding: 15px;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 5px;
        }

        .btn-gps-trigger:hover {
            background: var(--radar-green);
            color: var(--bg-tactical);
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.4);
        }

        .telemetry-readout {
            font-size: 0.75rem;
            color: var(--text-digital);
            line-height: 1.6;
        }
        .telemetry-readout span { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="matrix-title">AEGISGRID // LIVE SECURE MATRIX</div>
        <div class="auth-badge">OPERATOR // TIMMY</div>
    </header>

    <main>
        
        <div class="console-card">
            <div class="card-header-tag">Live Geographic Edge Operations Grid Map</div>
            <div id="map" class="map-frame"></div>
        </div>

        <div class="console-card">
            <div class="card-header-tag">Target Location Vector Readouts</div>
            <div class="telemetry-readout">
                <div>Latitude Coordinate: <span id="lblLat">Awaiting Connection...</span></div>
                <div>Longitude Coordinate: <span id="lblLng">Awaiting Connection...</span></div>
                <div>Tracking Accuracy Margin: <span id="lblAccuracy">0 meters</span></div>
            </div>
            <button class="btn-gps-trigger" onclick="initializeLiveTracking()">Activate Edge Beacon</button>
        </div>

    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Global Map Variables Matrix
        let map;
        let operatorMarker;
        let tacticalAccuracyCircle;

        // Initialize Base Geographic Map Layout Center default coordinates (Lagos, Nigeria area)
        function initMapGrid() {
            map = L.map('map').setView([6.5244, 3.3792], 12);
            
            // Inject free dark tile topology lines
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
        }

        // Connect natively to the mobile hardware GPS pipeline
        function initializeLiveTracking() {
            if ("geolocation" in navigator) {
                // Track current position sequentially in real time as the device moves
                navigator.geolocation.watchPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        const accuracy = position.coords.accuracy;

                        // Update tactical telemetry readout texts
                        document.getElementById('lblLat').innerText = lat.toFixed(6);
                        document.getElementById('lblLng').innerText = lng.toFixed(6);
                        document.getElementById('lblAccuracy').innerText = `± \${accuracy.toFixed(1)}m`;

                        const currentPos = [lat, lng];

                        if (!operatorMarker) {
                            // First acquisition: Drop a custom tracking beacon on the grid map
                            operatorMarker = L.marker(currentPos).addTo(map)
                                .bindPopup("<b>TIMMY FIELD NODE</b><br>Active Tracking Enabled.")
                                .openPopup();
                            
                            tacticalAccuracyCircle = L.circle(currentPos, {
                                radius: accuracy,
                                color: '#00ff66',
                                fillColor: '#00ff66',
                                fillOpacity: 0.15
                            }).addTo(map);

                            // Snap map focus right to the active device location
                            map.setView(currentPos, 15);
                        } else {
                            // Sequential movement update: Slide coordinates smoothly to the next point
                            operatorMarker.setLatLng(currentPos);
                            tacticalAccuracyCircle.setLatLng(currentPos).setRadius(accuracy);
                        }

                        // Execute Vocal Confirmation update loop
                        if ('speechSynthesis' in window && !window.speechSynthesis.speaking) {
                            let voiceMsg = new SpeechSynthesisUtterance("GPS operational edge tracking point locked. Coordinates transmitted successfully to the core repository.");
                            voiceMsg.pitch = 0.8;
                            voiceMsg.rate = 1.1;
                            window.speechSynthesis.speak(voiceMsg);
                        }
                    },
                    (error) => {
                        console.error("GPS Acquisition Fault:", error.message);
                        alert(`Tracking Failure: \${error.message}`);
                    },
                    {
                        enableHighAccuracy: true, // Forces hardware inside mobile devices to fire high-power GPS antennas
                        maximumAge: 0,
                        timeout: 10000
                    }
                );
            } else {
                alert("Hardware environment does not support native geolocation parameters.");
            }
        }

        // Initialize setup on complete layout loads
        window.onload = initMapGrid;
    </script>
</body>
</html>
