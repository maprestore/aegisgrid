<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Initialize Supabase
    const supabase = supabase.createClient('https://fmgjwxsdxydcwxddvpchf.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZtZ2p3eHNkeWdjd3hkZHZwY2hmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNTk3NjksImV4cCI6MjA5NjgzNTc2OX0.fgcojr3zEv4riwXmnKPDFSLElU7TaGJLAIr4uljRn_8');
    
    const ADMIN_KEY = "TIMMY2026";
    let map;
    let nodeCount = 0;

    // Use DOMContentLoaded to ensure the map div exists before initializing Leaflet
    window.addEventListener('DOMContentLoaded', () => {
        map = L.map('map', {tap: false}).setView([9.0820, 8.6753], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Crucial for grid layouts: forces the map to recalculate its display area
        setTimeout(() => {
            map.invalidateSize();
        }, 500);
    });
    
    // Mission Timer
    let startTime = new Date();
    setInterval(() => {
        let diff = new Date() - startTime;
        let m = Math.floor(diff / 60000);
        let s = Math.floor((diff % 60000) / 1000);
        document.getElementById('aiStatus').innerText = `MISSION: ${m}m ${s}s`;
    }, 1000);

    function emergencyWipe() {
        if (confirm("WARNING: DESTROY ALL FORENSIC DATA?")) {
            document.getElementById('logArea').innerHTML = "[SYSTEM_WIPED]";
            nodeCount = 0;
            document.getElementById('nodeCount').innerText = "0";
            speakGlobal("Critical wipe initiated. Logs destroyed.");
            setSystemStatus('RED');
        }
    }

    function setSystemStatus(status) {
        const header = document.getElementById('mainHeader');
        const pulse = document.getElementById('statusPulse');
        if (status === 'RED') {
            header.style.borderBottom = "2px solid #ff0000";
            pulse.style.background = "#ff0000";
            speakGlobal("Alert. Red status initiated. Threat detected.");
        } else {
            header.style.borderBottom = "2px solid #00ff66";
            pulse.style.background = "#00ff66";
            speakGlobal("System returned to nominal status.");
        }
    }

    function showSection(id) {
        document.getElementById('dashboard').style.display = (id === 'dashboard') ? 'block' : 'none';
        document.getElementById('admin').style.display = (id === 'admin') ? 'block' : 'none';
        document.getElementById('about').style.display = (id === 'about') ? 'block' : 'none';
        document.getElementById('sidebar').style.display = (id === 'admin') ? 'none' : 'block';
        
        // If switching back to dashboard, ensure map isn't broken
        if (id === 'dashboard' && map) {
            setTimeout(() => { map.invalidateSize(); }, 100);
        }
    }

    function exportLogs() {
        const text = document.getElementById('logArea').innerText;
        const blob = new Blob([text], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "AegisGrid_Forensic_Export.txt";
        a.click();
    }

    function requestAdminAccess() {
        const input = prompt("AUTHORIZATION REQUIRED: ENTER MASTER KEY");
        if (input === ADMIN_KEY) {
            showSection('admin');
            speakGlobal("Access granted. Welcome, Architect.");
        } else {
            speakGlobal("Unauthorized access detected.");
            alert("ACCESS DENIED");
        }
    }

    setInterval(() => { 
        const hb = document.getElementById('hbStatus');
        if(hb) hb.style.opacity = (hb.style.opacity === "0") ? "1" : "0"; 
    }, 1000);

    function speakGlobal(msg) {
        if ('speechSynthesis' in window) {
            const u = new SpeechSynthesisUtterance(msg);
            u.lang = 'en-US';
            window.speechSynthesis.speak(u);
        }
    }

    function initVoice() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        document.getElementById('aiStatus').innerText = "LISTENING...";
        recognition.onresult = (event) => {
            const cmd = event.results[0][0].transcript.toLowerCase();
            if(cmd.includes("transmit")) transmitData();
            document.getElementById('aiStatus').innerText = "ONLINE";
        };
        recognition.start();
    }

    async function transmitData() {
        if (!navigator.geolocation) {
            alert("Geolocation not supported by this browser.");
            return;
        }

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            const hash = "AEG-" + Math.random().toString(36).substring(2, 12).toUpperCase();

            // Push to Supabase
            const { error } = await supabase.from('logs').insert([{
                node_hash: hash,
                latitude: lat,
                longitude: lng
            }]);

            if (!error) {
                nodeCount++;
                document.getElementById('nodeCount').innerText = nodeCount;
                map.setView([lat, lng], 14);
                L.marker([lat, lng]).addTo(map);
                document.getElementById('integrityHash').innerText = hash;
                document.getElementById('logArea').innerHTML += `<br>> NODE_${nodeCount}: ${hash} (CLOUD_SYNCED)`;
                speakGlobal("Telemetry synchronized to cloud.");
            } else {
                console.error("Supabase Error:", error);
                alert("Sync Error: Check your database RLS policies.");
            }
        }, (err) => {
            alert("Location access denied or unavailable.");
        });
    }
</script>
