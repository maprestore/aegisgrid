<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AEGISGRID // Global & Federal Unified Matrix</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-tactical: #020305;
            --bg-deck: rgba(7, 12, 10, 0.9);
            --radar-green: #00ff66;
            --threat-amber: #ffaa00;
            --border-dim: rgba(0, 255, 102, 0.25);
            --text-digital: #a3b8b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }
        body, html { background-color: var(--bg-tactical); color: #ffffff; width: 100%; min-height: 100vh; overflow-x: hidden; }
        
        header {
            display: flex; justify-content: space-between; align-items: center; padding: 15px 20px;
            border-bottom: 1px solid var(--border-dim); background: rgba(2, 3, 5, 0.95);
        }

        .brand-container { display: flex; flex-direction: column; }
        .matrix-title { font-weight: 900; font-size: 1.1rem; letter-spacing: 2px; color: var(--radar-green); }
        .author-tag { font-size: 0.6rem; color: var(--text-digital); text-transform: uppercase; margin-top: 2px; }
        
        .view-switcher { display: flex; gap: 10px; }
        .mode-btn {
            background: transparent; border: 1px solid var(--border-dim); color: var(--text-digital);
            padding: 5px 15px; cursor: pointer; font-size: 0.75rem; font-weight: bold;
        }
        .mode-btn.active { border-color: var(--radar-green); color: var(--radar-green); background: rgba(0, 255, 102, 0.1); }

        main { display: grid; grid-template-columns: 1fr; gap: 15px; padding: 15px; max-width: 500px; margin: 0 auto; }
        .console-card { background: var(--bg-deck); border: 1px solid var(--border-dim); padding: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.8); }
        .card-header-tag { font-size: 0.7rem; color: var(--radar-green); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px dashed var(--border-dim); padding-bottom: 5px; display: flex; justify-content: space-between; }
        
        #map { 
            display: block !important; width: 100% !important; height: 280px !important; 
            background: #040806 !important; border: 1px solid rgba(0, 255, 102, 0.3); margin-bottom: 5px;
        }
        
        .stream-logger-view { font-size: 0.65rem; color: var(--text-digital); background: rgba(0,0,0,0.7); padding: 10px; border-left: 2px solid var(--radar-green); height: 90px; overflow-y: scroll; }
        .metric-val { color: var(--radar-green); font-weight: bold; }
        .input-node-wrapper { background: rgba(0,0,0,0.5); border: 1px solid rgba(0, 255, 102, 0.25); padding: 10px; margin-bottom: 10px; }
        .btn-trigger { width: 100%; background: linear-gradient(90deg, rgba(0, 255, 102, 0.15), transparent); border: 1px solid var(--radar-green); color: #fff; padding: 12px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .btn-trigger:hover { background: var(--radar-green); color: #000; }
        .admin-only { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="brand-container">
            <div class="matrix-title">AEGISGRID // SYSTEM</div>
            <div class="author-tag">POWERED BY TIMMY DON</div>
        </div>
        <div class="view-switcher">
            <button id="btnOperatorMode" class="mode-btn active" onclick="toggleInterfaceMode('operator')">OPERATOR</button>
            <button id="btnAdminMode" class="mode-btn" onclick="toggleInterfaceMode('admin')">ADMIN</button>
        </div>
    </header>

    <main>
        <div class="console-card">
            <div class="card-header-tag"><span id="txtMapTitle">Tactical Tracking Grid</span></div>
            <div id="map"></div>
        </div>

        <div class="console-card id-operator-panel">
            <div class="card-header-tag">Transmit Asset Telemetry</div>
            <select id="sectorZone" class="input-node-wrapper" style="width:100%; color:#fff; background:transparent;">
                <option value="Lagos Command Sector">Lagos State</option>
                <option value="FCT Abuja Command Sector">FCT Abuja</option>
            </select>
            <button class="btn-trigger" onclick="transmitOperatorData()">Transmit Coordinates</button>
        </div>

        <div class="console-card admin-only id-admin-panel">
            <div class="card-header-tag">Fleet Administration Command</div>
            <button class="btn-trigger" style="border-color:var(--threat-amber);" onclick="pullFullFleetMap()">Poll Fleet Assets</button>
        </div>
        
        <div class="stream-logger-view" id="telemetryTerminalLog">[SYSTEM] Initialized. Author: Timmy Don.</div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script>
        let map; let primaryMarker; let adminMarkersGroup = [];

        function initTacticalMap() {
            map = L.map('map', {tap: false}).setView([9.0820, 8.6753], 6);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            setTimeout(() => { map.invalidateSize(); }, 400);
        }

        function toggleInterfaceMode(mode) {
            document.querySelector('.id-operator-panel').style.display = (mode === 'operator' ? 'block' : 'none');
            document.querySelector('.id-admin-panel').style.display = (mode === 'admin' ? 'block' : 'none');
            document.getElementById('btnOperatorMode').classList.toggle('active', mode === 'operator');
            document.getElementById('btnAdminMode').classList.toggle('active', mode === 'admin');
            adminMarkersGroup.forEach(m => map.removeLayer(m));
            setTimeout(() => { map.invalidateSize(); }, 200);
        }

        function transmitOperatorData() {
            navigator.geolocation.getCurrentPosition((pos) => {
                const { latitude, longitude } = pos.coords;
                if(!primaryMarker) primaryMarker = L.marker([latitude, longitude]).addTo(map);
                else primaryMarker.setLatLng([latitude, longitude]);
                map.setView([latitude, longitude], 14);
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.speak(new SpeechSynthesisUtterance("Telemetry transmitted by Timmy Don system."));
                }
            });
        }

        function pullFullFleetMap() {
            alert("Polling fleet database...");
        }

        window.onload = initTacticalMap;
    </script>
</body>
</html>
