<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AEGISGRID // SECURE COMMAND</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg-tactical: #020305; --radar-green: #00ff66; --threat-amber: #ffaa00; --threat-red: #ff0000;
            --border-dim: rgba(0, 255, 102, 0.25); --text-digital: #a3b8b0; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }
        body { background: var(--bg-tactical); color: #fff; display: flex; flex-direction: column; min-height: 100vh; }
        header { padding: 15px 20px; border-bottom: 2px solid var(--radar-green); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); }
        .brand h1 { color: var(--radar-green); font-size: 1.1rem; letter-spacing: 2px; }
        .nav-bar { display: flex; gap: 15px; padding: 10px 20px; background: rgba(0,255,102,0.05); border-bottom: 1px solid var(--border-dim); }
        .nav-btn { cursor: pointer; color: #a3b8b0; font-size: 0.7rem; text-transform: uppercase; border: none; background: none; }
        .nav-btn:hover { color: var(--radar-green); }
        main { flex: 1; padding: 20px; display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        .console { border: 1px solid var(--border-dim); padding: 15px; background: rgba(7, 12, 10, 0.9); }
        #map { width: 100%; height: 500px; border: 1px solid var(--radar-green); }
        .widget { margin-top: 15px; padding: 15px; border: 1px solid var(--border-dim); background: #0a0e0c; }
        .btn-main { width: 100%; padding: 12px; margin-top: 10px; background: transparent; border: 1px solid var(--radar-green); color: var(--radar-green); cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-main:hover { background: var(--radar-green); color: #000; }
        @media (max-width: 768px) { main { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header id="mainHeader">
    <div class="brand"><h1>AEGISGRID // SECURE</h1></div>
    <div style="font-size: 0.7rem;">AI STATUS: <span id="aiStatus" style="color:var(--radar-green)">ONLINE</span></div>
</header>

<div class="nav-bar">
    <button class="nav-btn" onclick="showSection('dashboard')">FIELD OPS</button>
    <button class="nav-btn" onclick="requestAdminAccess()">COMMAND TOWER</button>
</div>

<main>
    <section id="dashboard">
        <div class="console"><div id="map"></div></div>
    </section>
    
    <section id="admin" style="display:none;" class="console">
        <h2 style="color:var(--radar-green); font-size: 1rem;">ADMIN COMMAND</h2>
        <div class="widget">
            <button class="btn-main" onclick="setSystemStatus('GREEN')">STATUS: GREEN</button>
            <button class="btn-main" onclick="setSystemStatus('RED')">STATUS: RED</button>
        </div>
        <div class="widget">
            <div id="logArea" style="font-size: 0.5rem; height: 120px; overflow-y: scroll;">[SYSTEM_LOG_INITIALIZED]</div>
            <button class="btn-main" onclick="exportLogs()">EXPORT DATA</button>
        </div>
    </section>

    <aside id="sidebar">
        <div class="console">
            <h2 style="font-size: 0.8rem; color:var(--radar-green);">COGNITIVE FEED</h2>
            <div class="widget">
                <div class="data-point"><span>NODES:</span><span id="nodeCount">0</span></div>
            </div>
            <button class="btn-main" onclick="transmitData()">TRANSMIT TELEMETRY</button>
        </div>
    </aside>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let supabase;
    
    // Initialize Supabase safely
    window.addEventListener('load', () => {
        supabase = supabase.createClient(
            'https://fmgjwxsdxydcwxddvpchf.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZtZ2p3eHNkeWdjd3hkZHZwY2hmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNTk3NjksImV4cCI6MjA5NjgzNTc2OX0.fgcojr3zEv4riwXmnKPDFSLElU7TaGJLAIr4uljRn_8'
        );
    });
    
    let map = L.map('map').setView([9.0820, 8.6753], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    let nodeCount = 0;

    async function transmitData() {
        if (!supabase) {
            alert("System initializing... wait a moment.");
            return;
        }

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const { error } = await supabase.from('logs').insert([{
                node_hash: "AEG-" + Math.random().toString(36).substring(2, 12).toUpperCase(),
                latitude: pos.coords.latitude,
                longitude: pos.coords.longitude
            }]);

            if (!error) {
                nodeCount++;
                document.getElementById('nodeCount').innerText = nodeCount;
                document.getElementById('logArea').innerHTML += `<br>> NODE_${nodeCount}: SYNCED TO CLOUD`;
            } else {
                console.error(error);
                alert("Sync Failed: Check your table permissions.");
            }
        });
    }

    function showSection(id) {
        document.getElementById('dashboard').style.display = (id === 'dashboard') ? 'block' : 'none';
        document.getElementById('admin').style.display = (id === 'admin') ? 'block' : 'none';
    }

    function requestAdminAccess() {
        if (prompt("ENTER MASTER KEY") === "TIMMY2026") showSection('admin');
    }
</script>
</body>
</html>
